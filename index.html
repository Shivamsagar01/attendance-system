<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASF Operators Attendance</title>

<style>

/* global fix for padding overflow */

*{
box-sizing:border-box;
}

body{
font-family:Arial;
background:#f2f4f7;
padding:20px;
text-align:center;
}

/* container */

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* header */

.headerRow{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
border-bottom:2px solid #0a4fa3;
padding-bottom:10px;
margin-bottom:15px;
}

.logo{
height:42px;
}

.title{
font-size:18px;
font-weight:bold;
color:#0a4fa3;
margin:0;
}

/* time */

.timeBox{
font-size:14px;
color:#444;
margin-bottom:10px;
}

/* inputs */

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

/* buttons */

button{
width:100%;
padding:14px;
margin-top:12px;
font-size:16px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

#cameraBtn{
background:#0a4fa3;
}

#submitBtn{
background:#2e9e45;
}

button:disabled{
background:#999;
}

/* camera preview */

video{
width:100%;
max-height:220px;
object-fit:cover;
margin-top:10px;
border-radius:10px;
display:none;
}

/* dummy face */

#dummyFace{
width:90px;
margin-top:12px;
}

/* captured selfie preview */

#photoPreview{
width:100%;
max-height:220px;
object-fit:cover;
margin-top:10px;
border-radius:10px;
display:none;
}

/* loading overlay */

#loadingOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.spinner{
border:6px solid #f3f3f3;
border-top:6px solid #0a4fa3;
border-radius:50%;
width:55px;
height:55px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* success popup */

#successPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 6px 30px rgba(0,0,0,0.25);
display:none;
z-index:1000;
width:280px;
}

.successIcon{
font-size:40px;
color:#2e9e45;
margin-bottom:10px;
}

#successPopup h2{
margin:0;
color:#2e9e45;
font-size:22px;
}

#successPopup p{
font-size:14px;
margin-top:8px;
color:#444;
}

</style>

</head>

<body>

<div class="container">

<div class="headerRow">

<img src="hpcl_logo.png" class="logo">
<h2 class="title">ASF Operators Attendance</h2>

</div>

<div class="timeBox" id="timeDisplay"></div>

<input id="name" placeholder="Enter Name">

<input id="empId" placeholder="Employee ID">

<img id="dummyFace" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<video id="video" autoplay></video>

<canvas id="canvas" style="display:none"></canvas>

<img id="photoPreview">

<button id="cameraBtn" onclick="cameraAction()">Capture Selfie</button>

<button id="submitBtn" onclick="submitAttendance()" disabled>Submit Attendance</button>

</div>

<div id="loadingOverlay">
<div class="spinner"></div>
</div>

<div id="successPopup">
<div class="successIcon">✓</div>
<h2>Attendance Recorded</h2>
<p>Your attendance has been successfully submitted.</p>
</div>

<script>

const API_URL="PASTE_YOUR_WEB_APP_URL";

let imageData="";
let latitude="";
let longitude="";
let cameraStarted=false;

/* live clock */

function updateTime(){

const now=new Date();

document.getElementById("timeDisplay").innerText=
"Date: "+now.toLocaleDateString()+" | Time: "+now.toLocaleTimeString();

}

setInterval(updateTime,1000);
updateTime();

/* camera button */

function cameraAction(){

if(!cameraStarted){

navigator.mediaDevices.getUserMedia({video:true})

.then(stream=>{

cameraStarted=true;

document.getElementById("video").style.display="block";
document.getElementById("dummyFace").style.display="none";

document.getElementById("video").srcObject=stream;

const btn=document.getElementById("cameraBtn");

btn.innerText="Upload Selfie";
btn.style.background="#f39c12";

});

}

else{

capturePhoto();

}

}

/* capture image */

function capturePhoto(){

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

canvas.getContext("2d").drawImage(video,0,0);

imageData=canvas.toDataURL("image/png");

document.getElementById("photoPreview").src=imageData;
document.getElementById("photoPreview").style.display="block";

video.srcObject.getTracks().forEach(track=>track.stop());
video.style.display="none";

document.getElementById("submitBtn").disabled=false;

}

/* location */

function getLocation(){

return new Promise((resolve,reject)=>{

navigator.geolocation.getCurrentPosition(function(pos){

latitude=pos.coords.latitude;
longitude=pos.coords.longitude;

resolve();

},function(){

alert("Location permission required");
reject();

});

});

}

/* submit */

async function submitAttendance(){

const name=document.getElementById("name").value;
const empId=document.getElementById("empId").value;

if(!name || !empId || !imageData){

alert("Name, Employee ID and Selfie are mandatory");
return;

}

document.getElementById("loadingOverlay").style.display="flex";

await getLocation();

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
name:name,
empId:empId,
lat:latitude,
lng:longitude,
image:imageData
})
})

.then(res=>res.text())

.then(response=>{

document.getElementById("loadingOverlay").style.display="none";

if(response=="SUCCESS"){

document.getElementById("successPopup").style.display="block";

setTimeout(()=>{

window.close();

},2200);

}

else{

alert("Attendance already marked for this shift");

}

});

}

</script>

</body>

</html>
